<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="334" viewBox="0 0 760 334" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SoloEnv features overview">
  <defs>
    <radialGradient id="fglow" cx="0.5" cy="0.0" r="0.9">
      <stop stop-color="#7fd962" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#7fd962" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="760" height="334" rx="12" fill="#0c0e17"/>
  <rect width="760" height="334" rx="12" fill="url(#fglow)"/>
  <rect x="0.75" y="0.75" width="758.5" height="332.5" rx="11.25" stroke="#1e2231" stroke-width="1.5"/>

  <!-- ROW 1 -->

  <!-- Card 1: One Command (green) -->
  <rect x="20" y="20" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="32" y="28" width="32" height="32" rx="7" fill="#7fd962" fill-opacity="0.11"/>
  <g transform="translate(36,32)" stroke="#7fd962" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="1" y="1" width="22" height="16" rx="2.5"/>
    <path d="M4 8 L8 12 L4 16"/>
    <line x1="10" y1="16" x2="17" y2="16"/>
  </g>
  <text x="72" y="37" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">One Command</text>
  <text x="72" y="56" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">soloenv up - that is it</text>
  <text x="72" y="73" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">no config required to start</text>

  <!-- Card 2: Any Docker App (blue) -->
  <rect x="266" y="20" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="278" y="28" width="32" height="32" rx="7" fill="#3fb6e0" fill-opacity="0.11"/>
  <g transform="translate(282,32)" stroke="#3fb6e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="2" y="2" width="20" height="9" rx="2"/>
    <rect x="2" y="13" width="20" height="9" rx="2"/>
    <line x1="2" y1="6.5" x2="22" y2="6.5" stroke-dasharray="3,2"/>
    <line x1="2" y1="17.5" x2="22" y2="17.5" stroke-dasharray="3,2"/>
  </g>
  <text x="318" y="37" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Any Docker App</text>
  <text x="318" y="56" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">compose.yaml or Dockerfile</text>
  <text x="318" y="73" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">no rewrites, no lock-in</text>

  <!-- Card 3: Public URL (cyan) -->
  <rect x="512" y="20" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="524" y="28" width="32" height="32" rx="7" fill="#22d3ee" fill-opacity="0.11"/>
  <g transform="translate(528,32)" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="12" cy="12" r="10"/>
    <ellipse cx="12" cy="12" rx="4.5" ry="10"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
  </g>
  <text x="564" y="37" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Public URL in Seconds</text>
  <text x="564" y="56" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">free Cloudflare quick tunnel</text>
  <text x="564" y="73" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">no account, no billing</text>

  <!-- ROW 2 -->

  <!-- Card 4: Detached Mode (purple) -->
  <rect x="20" y="122" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="32" y="130" width="32" height="32" rx="7" fill="#a78bfa" fill-opacity="0.11"/>
  <g transform="translate(36,134)" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="1" y="9" width="14" height="14" rx="2"/>
    <path d="M13 2 H22 V11"/>
    <line x1="22" y1="2" x2="11" y2="13"/>
  </g>
  <text x="72" y="139" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Detached Mode</text>
  <text x="72" y="158" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">--detach: survives terminal close</text>
  <text x="72" y="175" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">manage with status / down</text>

  <!-- Card 5: Password Protection (amber) -->
  <rect x="266" y="122" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="278" y="130" width="32" height="32" rx="7" fill="#f0a943" fill-opacity="0.11"/>
  <g transform="translate(282,134)" stroke="#f0a943" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="3" y="11" width="18" height="13" rx="2.5"/>
    <path d="M7 11 V7.5 A5 5 0 0 1 17 7.5 V11"/>
    <circle cx="12" cy="17.5" r="2" fill="#f0a943" stroke="none"/>
  </g>
  <text x="318" y="139" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Password Protection</text>
  <text x="318" y="158" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">--protect: HTTP basic auth</text>
  <text x="318" y="175" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">auto-generated or custom password</text>

  <!-- Card 6: Auto Teardown (purple) -->
  <rect x="512" y="122" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="524" y="130" width="32" height="32" rx="7" fill="#a78bfa" fill-opacity="0.11"/>
  <g transform="translate(528,134)" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="12" cy="12" r="10" stroke-width="1.5"/>
    <line x1="12" y1="5" x2="12" y2="12"/>
    <line x1="12" y1="12" x2="17" y2="16"/>
  </g>
  <text x="564" y="139" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Auto Teardown</text>
  <text x="564" y="158" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">--ttl 4h: self-expiring</text>
  <text x="564" y="175" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">nothing left running after TTL</text>

  <!-- ROW 3 -->

  <!-- Card 7: Realistic Env (blue) -->
  <rect x="20" y="224" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="32" y="232" width="32" height="32" rx="7" fill="#3fb6e0" fill-opacity="0.11"/>
  <g transform="translate(36,236)" stroke="#3fb6e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M4 1 H16 L22 7 V23 H4 Z"/>
    <path d="M16 1 V7 H22"/>
    <line x1="7" y1="12" x2="17" y2="12"/>
    <line x1="7" y1="16" x2="17" y2="16"/>
    <line x1="7" y1="20" x2="13" y2="20"/>
  </g>
  <text x="72" y="241" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Realistic Env</text>
  <text x="72" y="260" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">auto-loads .env.staging</text>
  <text x="72" y="277" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">previews mirror production config</text>

  <!-- Card 8: QR + Clipboard (green) -->
  <rect x="266" y="224" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="278" y="232" width="32" height="32" rx="7" fill="#7fd962" fill-opacity="0.11"/>
  <g transform="translate(282,236)" stroke="#7fd962" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="1" y="1" width="9" height="9" rx="1.5"/>
    <rect x="3" y="3" width="5" height="5" fill="#7fd962" stroke="none"/>
    <rect x="14" y="1" width="9" height="9" rx="1.5"/>
    <rect x="16" y="3" width="5" height="5" fill="#7fd962" stroke="none"/>
    <rect x="1" y="14" width="9" height="9" rx="1.5"/>
    <rect x="3" y="16" width="5" height="5" fill="#7fd962" stroke="none"/>
    <rect x="14" y="14" width="4" height="4" rx="1" fill="#7fd962" fill-opacity="0.8" stroke="none"/>
    <rect x="20" y="14" width="4" height="4" rx="1" fill="#7fd962" fill-opacity="0.5" stroke="none"/>
    <rect x="14" y="20" width="4" height="4" rx="1" fill="#7fd962" stroke="none"/>
    <rect x="20" y="20" width="4" height="4" rx="1" fill="#7fd962" fill-opacity="0.6" stroke="none"/>
  </g>
  <text x="318" y="241" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">QR + Clipboard</text>
  <text x="318" y="260" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">scan on mobile, URL auto-copied</text>
  <text x="318" y="277" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">share instantly, zero friction</text>

  <!-- Card 9: Single Binary (cyan) -->
  <rect x="512" y="224" width="228" height="88" rx="8" fill="#10131e" stroke="#1e2231" stroke-width="1.5"/>
  <rect x="524" y="232" width="32" height="32" rx="7" fill="#22d3ee" fill-opacity="0.11"/>
  <g transform="translate(528,236)" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M12 1 L22 6 V18 L12 23 L2 18 V6 Z"/>
    <path d="M2 6 L12 11 L22 6"/>
    <line x1="12" y1="11" x2="12" y2="23"/>
  </g>
  <text x="564" y="241" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#eef1f8">Single Static Binary</text>
  <text x="564" y="260" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11.5" fill="#6b768c">macOS / Linux / Windows</text>
  <text x="564" y="277" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#3d4460">written in Go, no runtime needed</text>
