version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    errcheck:
      exclude-functions:
        - (*github.com/fatih/color.Color).Printf
        - (*github.com/fatih/color.Color).Fprintf
        - (*github.com/fatih/color.Color).Println
        - (*github.com/fatih/color.Color).Fprintln
        - (*github.com/fatih/color.Color).Sprint
        - (*github.com/fatih/color.Color).Sprintln
        - (*github.com/fatih/color.Color).Sprintf

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
